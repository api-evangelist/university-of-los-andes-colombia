apis:
  - aid: university-of-los-andes-colombia:repositorio-oai
    name: Repositorio Institucional Seneca - OAI-PMH
    description: >-
      OAI-PMH metadata harvesting interface for the DSpace-based institutional
      repository "Seneca", which collects and preserves the University's open-access
      scholarly output (articles, theses, books, datasets, media). The repository is
      ranked among the top open-access repositories in Colombia. The endpoint
      returned an access-control response (HTTP 403) to automated clients at review
      time, so harvesting may require a browser-like user agent or coordination with
      the library.
