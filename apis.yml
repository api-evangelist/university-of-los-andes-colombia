aid: university-of-los-andes-colombia
name: University of Los Andes Colombia
description: >-
  Universidad de los Andes (Uniandes) is a private research university in Bogota,
  Colombia, founded in 1948, and ranked #179 in the QS World University Rankings
  2025. Its publicly observable developer/API footprint is limited: the strongest
  public machine-readable surface is the DSpace-based institutional repository
  "Seneca" (repositorio.uniandes.edu.co), which exposes an OAI-PMH metadata
  interface and a DSpace REST API for open-access scholarly content. Student-facing
  systems such as the Ellucian Banner SIS (MiBanner) are authentication-gated and
  do not publish public API documentation. No dedicated public developer portal or
  documented open API program was found at time of review.
