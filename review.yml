      Uniandes has no dedicated public developer portal or documented open API
      program. The only confirmed public machine-readable surface is the DSpace
      "Seneca" institutional repository, which is documented (via the ROAR registry
      and library) as exposing OAI-PMH and a DSpace REST API; however, both the
      repository root and its OAI/REST paths returned HTTP 403 to automated clients
      during this review (likely bot mitigation), so they are listed as
      conditionally available rather than verified-live. The MiBanner SIS is an
      authentication-gated Ellucian Banner login. The github.com/uniandes
      organization exists but exposes no public repositories and its official status
      is unconfirmed, so it was not cataloged. No endpoints were fabricated; only the
      publicly documented repository paths are listed.
